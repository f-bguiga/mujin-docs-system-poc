site_name: MujinOS Documentation Portal
site_description: System Architecture & Automation PoC for Lead Documentation Engineer Role
site_author: Your Name
site_url: https://yourusername.github.io/mujin-docs-system-poc

# 🎨 Theme Configuration (The "Professional Look")
theme:
  name: material
  language: en
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs          # Top-level persona-based navigation
    - navigation.sections      # Sidebar organization
    - navigation.expand        # Keep sidebar accessible
    - content.code.copy        # Critical for Developer Experience (DX)
    - content.code.annotate    # Allows explaining code lines in-line
    - search.suggest           # High-end search behavior
    - search.highlight

# 🧩 Plugins (The "Automation Engine")
plugins:
  - search
  - mkdocstrings:              # Auto-generates API docs from Python source
      handlers:
        python:
          paths: [.]           # Tells the plugin to look in the root for the /src folder
          options:
            show_source: true
            show_root_heading: true
            import_outline_sidebar: true

# 📝 Markdown Extensions (The "Industrial Formatting")
markdown_extensions:
  - admonition                 # Required for !!! danger, !!! warning blocks
  - pymdownx.details           # Collapsible blocks
  - pymdownx.superfences       # Advanced code block nesting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets          # Allows re-using text snippets across docs
  - toc:
      permalink: true          # Adds "anchor" links to headings for easy sharing

# 🗺️ Navigation (The "Information Architecture")
nav:
  - Home: index.md
  - ⚠️ Safety & Compliance: 
      - Standards Overview: safety/index.md
  - 🏭 Industrial Operator Guide:
      - Physical Installation: operator/hardware-setup.md
  - 💻 Developer Portal:
      - API & SDK Reference: developer/api-overview.md