site_name: MujinOS Documentation Portal
site_description: System Architecture & Automation PoC for Lead Documentation Engineer Role
site_author: Your Name
site_url: https://yourusername.github.io/mujin-docs-system-poc

# 🎨 Theme Configuration
theme:
  name: material
  language: en 
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

# 🧩 Plugins (The Corrected Automation Engine)
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.] 
          options:
            show_source: true
            show_root_heading: true
            import_outline_sidebar: true
  - i18n:
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ja
          name: 日本語
          build: true
      nav_translations:
        ja:
          Home: ホーム
          "⚠️ Safety & Compliance": "安全とコンプライアンス"
          "🏭 Industrial Operator Guide": "オペレーターガイド"
          "💻 Developer Portal": "開発者ポータル"

# 📝 Markdown Extensions
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - toc:
      permalink: true

# 🗺️ Navigation
nav:
  - Home: index.md
  - ⚠️ Safety & Compliance: 
      - Standards Overview: safety/index.md
  - 🏭 Industrial Operator Guide:
      - Physical Installation: operator/hardware-setup.md
  - 💻 Developer Portal:
      - API & SDK Reference: developer/api-overview.md